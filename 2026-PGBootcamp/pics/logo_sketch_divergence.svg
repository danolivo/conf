<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Gap fill between the two lines -->
    <linearGradient id="gapFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Estimated line gradient (cool blue) -->
    <linearGradient id="estLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a8ab5"/>
      <stop offset="100%" stop-color="#336791"/>
    </linearGradient>

    <!-- Actual line gradient (warm orange) -->
    <linearGradient id="actLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>

    <!-- Crosshair glow -->
    <filter id="crossGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="#1a1a2e"/>

  <!-- Subtle grid lines to suggest a chart -->
  <line x1="60" y1="80" x2="60" y2="280" stroke="#2d3748" stroke-width="1"/>
  <line x1="60" y1="280" x2="340" y2="280" stroke="#2d3748" stroke-width="1"/>
  <line x1="60" y1="230" x2="340" y2="230" stroke="#2d3748" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.3"/>
  <line x1="60" y1="180" x2="340" y2="180" stroke="#2d3748" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.3"/>
  <line x1="60" y1="130" x2="340" y2="130" stroke="#2d3748" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.3"/>

  <!-- Axis label: "rows" (vertical) -->
  <text x="30" y="180" text-anchor="middle" fill="#4a5568" font-family="monospace" font-size="9" transform="rotate(-90 30 180)">rows</text>
  <!-- Axis label: "plan nodes" (horizontal) -->
  <text x="200" y="300" text-anchor="middle" fill="#4a5568" font-family="monospace" font-size="9">plan nodes</text>

  <!--
    The gap region: filled area between estimated and actual.
    Both start together on the left, then diverge as we move right.
  -->
  <path d="
    M 80,240
    L 130,230  180,225  220,215  260,210  310,205
    L 310,120
    L 260,145  220,170  180,200  130,225
    L 80,240
    Z
  " fill="url(#gapFill)"/>

  <!-- Estimated rows line (smooth, confident, blue) -->
  <path d="
    M 80,240
    C 110,235 150,228 180,225
    C 210,222 240,215 260,210
    C 280,207 295,206 310,205
  " fill="none" stroke="url(#estLine)" stroke-width="3" stroke-linecap="round"/>

  <!-- Actual rows line (jagged, volatile, orange) — diverges upward -->
  <path d="
    M 80,240
    C 100,232 115,230 130,225
    C 145,215 160,208 180,200
    C 200,185 215,175 220,170
    C 235,158 248,150 260,145
    C 275,135 290,125 310,120
  " fill="none" stroke="url(#actLine)" stroke-width="3" stroke-linecap="round"/>

  <!-- Dot endpoints on estimated line -->
  <circle cx="80" cy="240" r="4" fill="#4a8ab5"/>
  <circle cx="310" cy="205" r="4" fill="#336791"/>

  <!-- Dot endpoints on actual line -->
  <circle cx="80" cy="240" r="4" fill="#FFD700"/>
  <circle cx="310" cy="120" r="4" fill="#FF6B35"/>

  <!-- Curly brace spanning the gap at the right end (between actual=120 and estimated=205) -->
  <!-- Vertical dashed lines from each curve to the brace endpoints -->
  <line x1="325" y1="120" x2="325" y2="125" stroke="#718096" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>
  <line x1="325" y1="200" x2="325" y2="205" stroke="#718096" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>

  <!-- Curly brace: top half (from actual line down to midpoint) -->
  <path d="
    M 325,125
    C 330,125 335,130 335,140
    L 335,155
    C 335,160 340,162.5 345,162.5
  " fill="none" stroke="#a0aec0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Curly brace: bottom half (from midpoint down to estimated line) -->
  <path d="
    M 345,162.5
    C 340,162.5 335,165 335,170
    L 335,185
    C 335,195 330,200 325,200
  " fill="none" stroke="#a0aec0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ×128 label at the brace tip -->
  <text x="350" y="166" fill="#FF6B35" font-family="monospace" font-size="11" font-weight="bold">×128</text>

  <!-- Legend -->
  <line x1="80" y1="320" x2="100" y2="320" stroke="#4a8ab5" stroke-width="2.5" stroke-linecap="round"/>
  <text x="108" y="324" fill="#a0aec0" font-family="monospace" font-size="9">estimated</text>

  <line x1="195" y1="320" x2="215" y2="320" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round"/>
  <text x="223" y="324" fill="#a0aec0" font-family="monospace" font-size="9">actual</text>

  <!-- Extension name -->
  <text x="200" y="358" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="16" font-weight="600" letter-spacing="1">pg_track_optimizer</text>
  <text x="200" y="378" text-anchor="middle" fill="#718096" font-family="system-ui, sans-serif" font-size="10" letter-spacing="2">FIND THE BAD ESTIMATES</text>
</svg>